<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hong Yena Portfolio 2026</title>
    <link rel="icon" href="./assets/favicon-active.png" type="image/png" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./favicon-state.js" defer></script>
  </head>
  <body>
    <header class="site-header" aria-label="Portfolio navigation">
      <a class="brand" href="./">Hong Yena</a>
      <nav>
        <a href="./page/">resumé</a>
        <a href="./stocktalk/">stocktalk</a>
        <a href="./piki/">Pik!</a>
        <a href="./efficient/">EFFICIENT</a>
      </nav>
    </header>

    <main class="home-snap" aria-label="Home">
      <section class="home-section intro-section" id="top">
        <h1>Design That<br />Means Something</h1>
        <p class="intro-note">
          Observe, Structure, Create<br />
          a design user experiences by observing smart frictions,
          structuring problems, and creating thoughtful solutions.
        </p>
      </section>

      <section class="home-section resume-section" id="resume">
        <a class="home-section-image resume-slide-link" href="./page/" aria-label="Open resumé">
          <img src="./assets/home-connected/resume-slide.png" alt="Hong Yena resumé section" />
        </a>
        <span class="home-embedded-nav-cover" aria-hidden="true"></span>
      </section>

      <section class="home-section works-section" id="works" aria-label="Works">
        <div class="works-copy">
          <h2>Works</h2>
          <div class="work-meta" aria-label="Design Scope">
            <span>Design Scope</span>
            <span>UXUI<br />AI<br />Branding<br />Visual Design</span>
          </div>
        </div>
        <div class="works-grid" aria-label="Works links">
          <a class="work-thumb" href="./stocktalk/" aria-label="Open stocktalk case study">
            <img src="./assets/home-connected/work-stocktalk.png" alt="stocktalk thumbnail" />
          </a>
          <a class="work-thumb" href="./piki/" aria-label="Open Pik case study">
            <img src="./assets/home-connected/work-piki.png" alt="Pik thumbnail" />
          </a>
          <a class="work-thumb" href="./efficient/" aria-label="Open EFFICIENT case study">
            <img src="./assets/home-connected/work-efficient.png" alt="EFFICIENT thumbnail" />
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
